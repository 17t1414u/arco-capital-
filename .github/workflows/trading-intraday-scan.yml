name: Trading Intraday Scan (Mid-day Scan)

# 米国市場OPEN後、3.5時間経過した時点で日中スキャン
# - EDT 期間: UTC 17:00 (= 13:00 EDT = 02:00 JST 翌日)
# - EST 期間: UTC 18:00 (= 13:00 EST = 03:00 JST 翌日)
on:
  schedule:
    - cron: '0 17 * * 1-5'    # EDT period
    - cron: '0 18 * * 1-5'    # EST period
  workflow_dispatch:

concurrency:
  group: trading-intraday
  cancel-in-progress: false

jobs:
  intraday-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check market is currently open
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
        run: |
          python scripts/check_market_open.py

      - name: Run Intraday Scan (LIVE on paper account)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          ALPACA_DATA_URL: ${{ secrets.ALPACA_DATA_URL }}
          PYTHONIOENCODING: utf-8
        run: |
          python investment_main.py --mode intraday-scan --live

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intraday-scan-logs-${{ github.run_id }}
          path: |
            outputs/intraday-scan/
            outputs/daily-state/
          retention-days: 14
