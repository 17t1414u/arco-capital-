name: Trading Morning Batch (Auto Pipeline)

# 米国市場OPEN 10分前に起動（毎平日）
# - EDT 期間 (3月-11月): UTC 13:20 (= 9:20 EDT = 22:20 JST)
# - EST 期間 (11月-3月): UTC 14:20 (= 9:20 EST = 23:20 JST)
# 両方を登録し、check_market_timing.py で適切なタイミングのみ実行する
on:
  schedule:
    - cron: '20 13 * * 1-5'   # EDT period (Mar-Nov)
    - cron: '20 14 * * 1-5'   # EST period (Nov-Mar)
  workflow_dispatch:           # 手動実行も可能

# 同時実行を防ぐ（重複取引リスク回避）
concurrency:
  group: trading-morning
  cancel-in-progress: false

jobs:
  morning-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check market timing
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
        run: |
          python scripts/check_market_timing.py
        continue-on-error: false

      - name: Run AutoCrew (LIVE on paper account)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          ALPACA_DATA_URL: ${{ secrets.ALPACA_DATA_URL }}
          PYTHONIOENCODING: utf-8
        run: |
          python investment_main.py --mode auto --live

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-batch-logs-${{ github.run_id }}
          path: |
            outputs/auto-daily/
            outputs/daily-state/
            ArcoCapital/資産運用事業部/実績/
          retention-days: 30
